server:
  port: 8888

spring:
  application:
    name: infra-config-service

  cloud:
    config:
      server:
        git:
          uri: file:///C:/micro/proyecto/config-repo
          default-label: main
          clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4317
    metrics:
      export:
        enabled: true


otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317

  resource:
    attributes:
      service.name: ${spring.application.name}
      service.version: 1.0.0

logging:
  level:
    root: INFO
    pe.nom.charlygastelo.app: DEBUG